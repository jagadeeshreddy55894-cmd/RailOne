<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings</title>

    <link rel="stylesheet" href="style.css">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>

    <!-- Header -->

    <header class="header">

        <div class="top">

            <div class="back-btn">
                <span class="material-icons">arrow_back</span>
            </div>

            <h1>My Bookings</h1>

            <span class="material-icons menu">
                sort
            </span>

        </div>

    </header>


    <!-- Upcoming -->

    <div class="title-row">

        <h2>Upcoming</h2>

        <span class="material-icons refresh">
            refresh
        </span>

    </div>


    <!-- Ticket -->

    <div class="ticket">

        <div class="badge">
            Unreserved
        </div>


        <div class="row">

            <div>

                <p class="label">
                    Train No.
                </p>

                <h3>
                    11905 (Hoshiarpur Exp)
                </h3>

            </div>

            <div class="right">

                <p class="label">
                    Journey Date
                </p>

                <h3>
                    Thu, 23 Jul 26
                </h3>

            </div>

        </div>


        <div class="row station">

            <div>

                <h2>
                    AGRA CANTT JN.
                </h2>

            </div>

            <div class="right">

                <h2>
                    Phagwara JN.
                </h2>

            </div>

        </div>


        <div class="dotted"></div>


        <div class="ticket-cut left"></div>

        <div class="ticket-cut right"></div>


        <div class="actions">

            <button class="book-btn">

                Book Again

            </button>


            <div class="divider"></div>


            <button class="view-btn"
            onclick="window.location.href='details.html'">

                View Details

            </button>

        </div>

    </div>


    <!-- Bottom Navigation -->

    <nav>

        <div>

            <span class="material-icons">
                confirmation_number
            </span>

            <p>Upcoming</p>

        </div>

        <div>

            <span class="material-icons">
                confirmation_number
            </span>

            <p>Completed</p>

        </div>

        <div>

            <span class="material-icons">
                confirmation_number
            </span>

            <p>Cancelled</p>

        </div>

        <div class="active">

            <span class="material-icons">
                account_balance_wallet
            </span>

            <p>All</p>

        </div>

    </nav>

</body> 
</html>
